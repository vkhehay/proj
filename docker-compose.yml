version: "3.12"
services:
    api:
      build: . # take everything(docker image) from local folder
      ports:
        - "8000:8000"
      volumes:
        - ./:/usr/src/app:ro #to bind local folder with docker container REREAD/ReOpen ALL CHANGES IN APP
                             # no need in production version
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
                # this command change server CMD command in Dockerfile with reloading
                # no need in production version
      env_file:
        - ./.env
#      environment:
#        - SECRET_KEY=09d25e094faa6ca2556c818166b7a9563b93f7099f6f0f4caa6cf63b88e8d3e7
#        - ALGORITHM=HS256
#        - ACCESS_TOKEN_EXP_MIN=15
      depends_on:
        - db
#
#    db:
#      image: postgres:16
#      container_name: proj-db
#      env_file:
#        - ./.env
#      ports:
#        - "5432:5432"

    db:
      image: postgres:16 # to load image from dockerhub site
      container_name: proj_db
      environment:
        - POSTGRES_PASSWORD=1234 #CAN TAKE VALUES FROM .env FILE FROM ${DB_PASSWORD}
        - POSTGRES_DB=fastapi #CAN TAKE VALUES FROM .env FILE FROM ${DB_NAME}
      volumes:
        - postgres_db:/var/lib/postgresql/data # to record all database data in /var/lib/postgresql/data folder

volumes:
  postgres_db: # to use "postgres_db" folder




