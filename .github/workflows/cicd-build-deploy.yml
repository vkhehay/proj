name: Build and Deploy code

on: [push, pull_request]

jobs:
#  job1:
  build: # remained job1 to build
    name: Run on Ubuntu
    runs-on: ubuntu-22.04
    environment:
      name: ENV
    env:
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      ACCESS_TOKEN_EXP_MIN: ${{ secrets.ACCESS_TOKEN_EXP_MIN }}
      DB_HOST: ${{ secrets.DB_HOST }}

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: ${{ secrets.DB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}_test
        options: >- # here var must be $<variable>
          --health-cmd="pg_isready -U postgres" 
          --health-interval=10s 
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: test with pytest
        run: |
          pip install pytest
          pytest

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: buildx
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./Dockerfile
          builder: ${{steps.buildx.outputs.name}}
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME  }}/proj-vkhehay:latest
      - name: Image digest
        run: echo ${{steps.docker_build.outputs.digest}}

#  job2:
  deploy: #renamed job2 to deploy
    runs-on: ubuntu-22.04
    needs: [build] # set up dependence of jobs before implement deploy
    environment:
      name: production
    env:
      HOST: ${{ secrets.HOST }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
#      PORT: ${{ secrets.PORT }}

    steps:
      - name: pulling git repo
        uses: actions/checkout@v4
      - name: deploying to ubuntu server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
#          port: $secrets.PORT
          script: |
            cd proj/src 
            git clone https://github.com/vkhehay/proj.git .
            source $HOME/proj/venv/bin/activate
            pip install -r $HOME/proj/src/requirements.txt
            echo ${{ secrets.PASSWORD }} | sudo -S systemctl restart api

